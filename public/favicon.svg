  </defs>
  <rect width="32" height="32" rx="6" fill="#07040A"/>
  <text x="16" y="23" text-anchor="middle" font-family="'Bebas Neue', 'Impact', sans-serif" font-weight="900" font-size="22" fill="url(#g)" filter="url(#glow)" letter-spacing="-0.5">VI</text>
