<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D7B"/>
      <stop offset="50%" stop-color="#FF6B1A"/>
      <stop offset="100%" stop-color="#FFD166"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A0A1F"/>
      <stop offset="100%" stop-color="#07040A"/>
    </radialGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="18" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <rect x="8" y="8" width="496" height="496" rx="92" fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.4"/>
  <text x="256" y="370" text-anchor="middle" font-family="'Bebas Neue', 'Impact', sans-serif" font-weight="900" font-size="380" fill="url(#grad)" filter="url(#neon)" letter-spacing="-10">VI</text>
</svg>
